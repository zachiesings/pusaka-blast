name: pusaka_blast
description: Pusaka Blast — teka-teki balok 8x8 bermotif batik Nusantara.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2          # simple, CI-stable state management (no codegen)
  shared_preferences: ^2.2.2 # local persistence (high scores, coins, settings)
  google_mobile_ads: '>=5.3.0 <7.0.0'  # rewarded/interstitial/banner; App ID injected by CI

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  background_color: "#15110A"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
